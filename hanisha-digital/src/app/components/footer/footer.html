<footer class="footer">
  <div class="container">
    <div class="footer-top">
      <a href="#" class="footer-logo" aria-label="TECH Studio">
        <svg class="its-icon-instance footer-icon" aria-hidden="true" focusable="false">
          <use xlink:href="#ts-logo-symbol"></use>
        </svg>
        <span class="footer-logo-text">TECH <span class="logo-accent">Studio</span></span>
      </a>
      <p class="footer-tagline">
        {{ 'footer.tagline' | t }}
      </p>
      <nav class="footer-nav">
        <a href="#about">{{ 'footer.nav.about' | t }}</a>
        <a href="#services">{{ 'footer.nav.services' | t }}</a>
        <a href="#work">{{ 'footer.nav.work' | t }}</a>
        <a href="#how-we-work">{{ 'footer.nav.process' | t }}</a>
        <a href="#why-us">{{ 'footer.nav.whyUs' | t }}</a>
        <a href="#contact">{{ 'footer.nav.contact' | t }}</a>
      </nav>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ currentYear }} {{ 'footer.copyright' | t }}</p>
    </div>
  </div>
</footer>
