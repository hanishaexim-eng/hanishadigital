<section class="contact" id="contact">

    <div class="contact-wrapper">
      <div class="contact-info">
        <span class="section-tag">{{ 'contact.sectionTag' | t }}</span>
        <h2 class="section-title">{{ 'contact.title' | t }}</h2>
        <p class="contact-lead">
          {{ 'contact.lead' | t }}
        </p>
        <div class="contact-details">
          <div class="contact-item">
            <span class="label">{{ 'contact.label.email' | t }}</span>
            <a href="mailto:hanishaexim@gmail.com">hanishaexim@gmail.com</a>
          </div>
          <div class="contact-item">
            <span class="label">{{ 'contact.label.services' | t }}</span>
            <p>{{ 'contact.value.services' | t }}</p>
          </div>
          <div class="contact-item">
            <span class="label">{{ 'contact.label.reach' | t }}</span>
            <p>{{ 'contact.value.reach' | t }}</p>
          </div>
        </div>
      </div>
